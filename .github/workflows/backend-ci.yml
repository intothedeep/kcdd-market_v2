name: Backend CI - Quality Checks

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/api/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'backend/api/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend/api

jobs:
  code-quality:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: backend/api/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        run: pnpm run format:check

      - name: Run ESLint
        run: pnpm run lint

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: backend/api/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@v3.95.5
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [code-quality, security]
    if: always()

    # Override the top-level defaults.run.working-directory because this job
    # does not check out the repo (no backend/api/ folder on disk).
    defaults:
      run:
        working-directory: .

    steps:
      - name: Check job results
        run: |
          if [[ "${{ needs.code-quality.result }}" == "success" ]] && \
             [[ "${{ needs.security.result }}" == "success" ]]; then
            echo "All checks passed."
            exit 0
          else
            echo "Some checks failed:"
            echo "Code Quality: ${{ needs.code-quality.result }}"
            echo "Security: ${{ needs.security.result }}"
            exit 1
          fi
