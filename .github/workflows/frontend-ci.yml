name: Frontend CI - Quality Checks

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend-vite/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'frontend-vite/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: frontend-vite

jobs:
  code-quality:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend-vite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npm run format:check
        
      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check
        continue-on-error: true

  accessibility:
    name: Accessibility (A11y) Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend-vite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run axe accessibility tests
        run: npm run test:a11y
        continue-on-error: true

      - name: Run ESLint with jsx-a11y rules
        run: npm run lint:a11y

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [code-quality, accessibility]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend-vite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          # Use dummy values for build
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_dummy' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'http://localhost:54321' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'dummy_key' }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY || 'pk_test_dummy' }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:4000' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: frontend-vite/dist/
          retention-days: 7

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [code-quality, accessibility, build]
    if: always()

    steps:
      - name: Check job results
        working-directory: /home/runner/work
        run: |
          if [[ "${{ needs.code-quality.result }}" == "success" ]] && \
             [[ "${{ needs.accessibility.result }}" == "success" ]] && \
             [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ All checks passed!"
            exit 0
          else
            echo "❌ Some checks failed:"
            echo "Code Quality: ${{ needs.code-quality.result }}"
            echo "Accessibility: ${{ needs.accessibility.result }}"
            echo "Build: ${{ needs.build.result }}"
            exit 1
          fi

