# Automatically label PRs based on changed files.
# Uses actions/labeler@v5 syntax (changed-files / any-glob-to-any-file).

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - frontend-vite/**/*

backend:
  - changed-files:
      - any-glob-to-any-file:
          - backend/**/*

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - docs/**/*

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - '**/package.json'
          - '**/pnpm-lock.yaml'

configuration:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.config.{js,ts,cjs,mjs}'
          - '**/.*.{js,json,yml,yaml}'
          - .github/**/*

accessibility:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*a11y*'
          - '**/*.a11y.{ts,tsx,js,jsx}'

components:
  - changed-files:
      - any-glob-to-any-file:
          - '**/components/**/*'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.{ts,tsx,js,jsx}'
          - '**/*.spec.{ts,tsx,js,jsx}'
          - '**/tests/**/*'
          - '**/test/**/*'
