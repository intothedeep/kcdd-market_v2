# Supabase Configuration File

[api]
enabled = true
port = 54321
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[local_smtp]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Third-party JWT validation (Clerk)
# Lets Supabase verify Clerk-issued JWTs via Clerk's public JWKS endpoint,
# so RLS policies referencing public.clerk_user_id() can read the JWT sub claim.
# See _docs/clerk-supabase-auth.md for details.
[auth.third_party.clerk]
enabled = true
domain = "immense-stallion-77.clerk.accounts.dev"

[realtime]
enabled = true

[edge_runtime]
enabled = false

# Disabled for Colima: the analytics stack starts a `vector` container that
# bind-mounts the Docker socket. Colima resolves /var/run/docker.sock to the
# virtiofs-shared ~/.colima/default/docker.sock, which can't be bind-mounted
# ("operation not supported"). Off = no vector container = clean start.
[analytics]
enabled = false

