<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="Northland Code Coalition">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#BF360C"/><stop offset="1" stop-color="#E64A19"/></linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <g filter="url(#soft)" opacity="0.6">
    <circle cx="191" cy="90" r="190" fill="#FF8A65"/>
    <circle cx="418" cy="360" r="240" fill="#FFCA28"/>
    <circle cx="1080" cy="60" r="170" fill="#FF7043"/>
  </g>
  <g filter="url(#sh)" font-family="Arial,Helvetica,sans-serif" fill="#fff">
    <text x="64" y="208" font-size="116" font-weight="800">NCC</text>
    <text x="68" y="270" font-size="40" font-weight="600" opacity="0.96">Northland Code Coalition</text>
  </g>
</svg>
