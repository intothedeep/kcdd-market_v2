<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="Grow the Digital Navigator Corps">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1A237E"/><stop offset="1" stop-color="#283593"/></linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <g filter="url(#soft)" opacity="0.6">
    <circle cx="160" cy="90" r="190" fill="#5C6BC0"/>
    <circle cx="576" cy="360" r="240" fill="#8C9EFF"/>
    <circle cx="1080" cy="60" r="170" fill="#00B0FF"/>
  </g>
  <g filter="url(#sh)" font-family="Arial,Helvetica,sans-serif" fill="#fff">
    <text x="64" y="208" font-size="116" font-weight="800">#13</text>
    <text x="68" y="270" font-size="40" font-weight="600" opacity="0.96">Grow the Digital Navigator Corps</text>
  </g>
</svg>
